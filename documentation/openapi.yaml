    description: Generated server url
paths:
  /suppliers:
    get:
      tags:
        - supplier-controller
      operationId: listSupplier
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SupplierDTO'
    post:
      tags:
        - supplier-controller
      operationId: createSupplier
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSupplierRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/SupplierDTO'
