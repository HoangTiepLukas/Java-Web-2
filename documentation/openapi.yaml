components:
  schemas:
    CreateSupplierRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    SupplierDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time
    CreateOfferRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
        supplierId:
          type: integer
          format: int64
        customerId:
          type: integer
          format: int64
      required:
        - customerId
        - price
        - supplierId
    OfferDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        price:
          type: number
        status:
          type: string
        supplierName:
          type: string
        customerName:
          type: string
        createdAt:
          type: string
          format: date-time
    AcceptOfferRequest:
      type: object
      properties:
        accepted:
          type: boolean
    AcceptDeliveryRequest:
      type: object
      properties:
        accepted:
          type: boolean
    CreateCustomerRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    CustomerDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time
    UpdateOfferRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number